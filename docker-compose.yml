services:
  mongo:
    image: mongo:7
    container_name: terrangafood-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    restart: unless-stopped

  api:
    build: ./api
    container_name: terrangafood-api
    ports:
      - "3001:3001"
    environment:
      - MONGODB_URI=mongodb://mongo:27017/terrangafood
      - PORT=3001
    depends_on:
      - mongo
    restart: unless-stopped

  web:
    build:
      context: ./web
      args:
        NEXT_PUBLIC_API_URL: http://localhost:3001/api
    container_name: terrangafood-web
    ports:
      - "3000:3000"
    environment:
      # URL utilisée par les Server Components (SSR) : nom de service Docker.
      # NEXT_PUBLIC_API_URL (build arg) reste valable côté navigateur.
      - API_INTERNAL_URL=http://api:3001/api
    depends_on:
      - api
    restart: unless-stopped

volumes:
  mongo-data:
